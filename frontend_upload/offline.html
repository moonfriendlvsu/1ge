<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Офлайн — 1=GE</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 1rem;
        }

        .offline-container {
            text-align: center;
            max-width: 400px;
        }

        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.7;
                transform: scale(0.95);
            }
        }

        .offline-logo {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .logo-1,
        .logo-eq {
            color: #FCD34D;
        }

        .logo-ge {
            color: #10B981;
        }

        h1 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }

        p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .retry-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #10B981, #0EA5E9);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }
    </style>
</head>

<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <div class="offline-logo">
            <span class="logo-1">1</span><span class="logo-eq">=</span><span class="logo-ge">GE</span>
        </div>
        <h1>Интернет жоқ</h1>
        <p>Қазір интернет байланысы жоқ. Қайта қосылу үшін түймені басыңыз.</p>
        <button class="retry-btn" onclick="location.reload()">🔄 Қайталау</button>
    </div>
</body>

</html>
