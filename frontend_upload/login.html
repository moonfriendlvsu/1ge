<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кіру — 1=GE</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#10B981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1.0">
    <link rel="stylesheet" href="auth.css?v=1.0">
</head>

<body class="auth-body">
    <!-- Disclaimer Banner -->
    <div class="disclaimer-banner" data-kk="⚠️ Тест нұсқасы. Төлемдер қабылданбайды."
        data-ru="⚠️ Тестовая версия. Приём платежей не осуществляется.">
        ⚠️ Тест нұсқасы. Төлемдер қабылданбайды.
    </div>

    <div class="auth-container">
        <!-- Back to Home -->
        <a href="/" class="auth-back">
            <span>←</span>
            <span data-kk="Басты бетке" data-ru="На главную">Басты бетке</span>
        </a>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <span class="logo-1">1</span><span class="logo-eq">=</span><span class="logo-ge">GE</span>
            </div>

            <h1 class="auth-title" data-kk="Кіру" data-ru="Вход">Кіру</h1>
            <p class="auth-subtitle" data-kk="Жеке кабинетке кіріңіз" data-ru="Войдите в личный кабинет">Жеке кабинетке
                кіріңіз</p>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email" data-kk="Email" data-ru="Email">Email</label>
                    <div class="input-with-icon">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" name="email" placeholder="user@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" data-kk="Құпия сөз" data-ru="Пароль">Құпия сөз</label>
                    <div class="input-with-icon">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="toggle-password">👁️</button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span data-kk="Мені есте сақта" data-ru="Запомнить меня">Мені есте сақта</span>
                    </label>
                    <a href="#" class="forgot-link" data-kk="Құпия сөзді ұмыттыңыз ба?" data-ru="Забыли пароль?">Құпия
                        сөзді ұмыттыңыз ба?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-large">
                    <span data-kk="Кіру" data-ru="Войти">Кіру</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span data-kk="немесе" data-ru="или">немесе</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn kaspi-btn">
                    <span>💳</span>
                    <span>Kaspi арқылы кіру</span>
                </button>
            </div>

            <!-- Register Link -->
            <p class="auth-footer">
                <span data-kk="Аккаунтыңыз жоқ па?" data-ru="Нет аккаунта?">Аккаунтыңыз жоқ па?</span>
                <a href="register.html" data-kk="Тіркелу" data-ru="Зарегистрироваться">Тіркелу</a>
            </p>
        </div>

        <!-- Theme & Language Toggle -->
        <div class="auth-lang">
            <button class="theme-toggle" id="theme-toggle" aria-label="Тема">
                <span class="theme-icon-dark">🌙</span>
                <span class="theme-icon-light">☀️</span>
            </button>
            <button class="lang-btn active" data-lang="kk">ҚАЗ</button>
            <button class="lang-btn" data-lang="ru">РУС</button>
        </div>
    </div>

    <script type="module" src="auth.js?v=1.0"></script>
    <script src="shared.js"></script>
</body>

</html>
