<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — 1=GE</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="theme-color" content="#10B981">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1.0">
    <style>
        .admin-body {
            background: var(--color-bg);
            min-height: 100vh;
            padding: 1rem;
        }

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .admin-logo {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo-1,
        .logo-eq {
            color: #FCD34D;
        }

        .logo-ge {
            color: #10B981;
        }

        .admin-badge {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .stat-label {
            color: var(--color-text-muted);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .users-table {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            overflow: hidden;
        }

        .table-header,
        .table-row {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr 1fr;
            padding: 1rem;
            gap: 1rem;
        }

        .table-header {
            background: rgba(255, 255, 255, 0.05);
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--color-text-muted);
        }

        .table-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.875rem;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), #0EA5E9);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            margin-right: 0.5rem;
            vertical-align: middle;
        }

        .balance-positive {
            color: var(--color-primary);
        }

        .status-verified {
            color: var(--color-primary);
            font-size: 0.875rem;
        }

        .loading {
            text-align: center;
            padding: 3rem;
            color: var(--color-text-muted);
        }

        .action-btn {
            padding: 0.25rem 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: var(--color-text-muted);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {

            .table-header,
            .table-row {
                grid-template-columns: 1fr 1fr;
            }

            .table-header>span:nth-child(n+3),
            .table-row>span:nth-child(n+3) {
                display: none;
            }
        }
    </style>
</head>

<body class="admin-body">
    <!-- Disclaimer Banner -->
    <div class="disclaimer-banner" data-kk="⚠️ Тест нұсқасы. Төлемдер қабылданбайды."
        data-ru="⚠️ Тестовая версия. Приём платежей не осуществляется.">
        ⚠️ Тест нұсқасы. Төлемдер қабылданбайды.
    </div>

    <div class="admin-container">
        <!-- Header -->
        <header class="admin-header">
            <div class="admin-logo">
                <span class="logo-1">1</span><span class="logo-eq">=</span><span class="logo-ge">GE</span>
                <span class="admin-badge">ADMIN</span>
            </div>
            <a href="/" class="back-btn">← На главную</a>
        </header>

        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-users">-</div>
                <div class="stat-label">Пользователей</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-transactions">-</div>
                <div class="stat-label">Транзакций</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-spent">-</div>
                <div class="stat-label">Потрачено ₸</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-balance">-</div>
                <div class="stat-label">Баланс ₸</div>
            </div>
        </div>

        <!-- Users -->
        <h2 class="section-title">👥 Пользователи</h2>
        <div class="users-table">
            <div class="table-header">
                <span>Имя</span>
                <span>Email</span>
                <span>Баланс</span>
                <span>Статус</span>
                <span>Действия</span>
            </div>
            <div id="users-list">
                <div class="loading">⏳ Загрузка...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, collection, getDocs, query, orderBy } from './firebase-config.js';

        // Load users
        async function loadUsers() {
            const usersList = document.getElementById('users-list');

            try {
                const usersSnapshot = await getDocs(collection(db, 'users'));
                const users = [];
                let totalBalance = 0;

                usersSnapshot.forEach(doc => {
                    const data = doc.data();
                    users.push({ id: doc.id, ...data });
                    totalBalance += data.balance || 0;
                });

                document.getElementById('total-users').textContent = users.length;
                document.getElementById('total-balance').textContent = totalBalance.toLocaleString();

                // Render users
                usersList.innerHTML = users.map(user => {
                    const initials = (user.name || 'NN').split(' ').map(n => n[0]).slice(0, 2).join('').toUpperCase();
                    return `
                        <div class="table-row">
                            <span><span class="user-avatar">${initials}</span>${user.name || 'Без имени'}</span>
                            <span>${user.email || '-'}</span>
                            <span class="balance-positive">${(user.balance || 0).toLocaleString()}₸</span>
                            <span class="status-verified">✓</span>
                            <span><button class="action-btn">👁️</button></span>
                        </div>
                    `;
                }).join('');

                // Load transactions stats
                const txSnapshot = await getDocs(collection(db, 'transactions'));
                let txCount = 0;
                let totalSpent = 0;

                txSnapshot.forEach(doc => {
                    const data = doc.data();
                    txCount++;
                    if (data.type !== 'refill') {
                        totalSpent += data.amount || 0;
                    }
                });

                document.getElementById('total-transactions').textContent = txCount;
                document.getElementById('total-spent').textContent = totalSpent.toLocaleString();

            } catch (error) {
                console.error('Error loading users:', error);
                usersList.innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            }
        }

        loadUsers();
    </script>
    <script src="shared.js"></script>
</body>

</html>
