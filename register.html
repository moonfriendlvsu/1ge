<!DOCTYPE html>
<html lang="kk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тіркелу — 1=GE</title>

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta name="theme-color" content="#10B981">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body class="auth-body">
    <div class="auth-container">
        <!-- Back to Home -->
        <a href="/" class="auth-back">
            <span>←</span>
            <span data-kk="Басты бетке" data-ru="На главную">Басты бетке</span>
        </a>

        <!-- Auth Card -->
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <span class="logo-1">1</span><span class="logo-eq">=</span><span class="logo-ge">GE</span>
            </div>

            <h1 class="auth-title" data-kk="Тіркелу" data-ru="Регистрация">Тіркелу</h1>
            <p class="auth-subtitle" data-kk="1=GE қоғамдастығына қосылыңыз"
                data-ru="Присоединяйтесь к сообществу 1=GE">1=GE қоғамдастығына қосылыңыз</p>

            <!-- Registration Form -->
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <label for="name" data-kk="Аты-жөніңіз" data-ru="Ваше имя">Аты-жөніңіз</label>
                    <div class="input-with-icon">
                        <span class="input-icon">👤</span>
                        <input type="text" id="name" name="name" placeholder="Асан Қасым" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email" data-kk="Email" data-ru="Email">Email</label>
                    <div class="input-with-icon">
                        <span class="input-icon">📧</span>
                        <input type="email" id="email" name="email" placeholder="user@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="iin" data-kk="ЖСН (ИИН)" data-ru="ИИН">ЖСН (ИИН)</label>
                    <div class="input-with-icon">
                        <span class="input-icon">🆔</span>
                        <input type="text" id="iin" name="iin" placeholder="XXXXXXXXXXXX" maxlength="12" required>
                    </div>
                    <span class="input-hint" data-kk="Верификация үшін қажет"
                        data-ru="Необходимо для верификации">Верификация үшін қажет</span>
                </div>

                <div class="form-group">
                    <label for="password" data-kk="Құпия сөз" data-ru="Пароль">Құпия сөз</label>
                    <div class="input-with-icon">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" name="password" placeholder="••••••••" required
                            minlength="6">
                        <button type="button" class="toggle-password" id="toggle-password">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password-confirm" data-kk="Құпия сөзді растаңыз" data-ru="Подтвердите пароль">Құпия
                        сөзді растаңыз</label>
                    <div class="input-with-icon">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password-confirm" name="password-confirm" placeholder="••••••••"
                            required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required>
                        <span data-kk="Мен шарттармен келісемін" data-ru="Я согласен с условиями">Мен <a
                                href="#">шарттармен</a> келісемін</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-large">
                    <span data-kk="Тіркелу" data-ru="Зарегистрироваться">Тіркелу</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="auth-divider">
                <span data-kk="немесе" data-ru="или">немесе</span>
            </div>

            <!-- Social Login -->
            <div class="social-login">
                <button class="social-btn kaspi-btn">
                    <span>💳</span>
                    <span>Kaspi арқылы тіркелу</span>
                </button>
            </div>

            <!-- Login Link -->
            <p class="auth-footer">
                <span data-kk="Аккаунтыңыз бар ма?" data-ru="Уже есть аккаунт?">Аккаунтыңыз бар ма?</span>
                <a href="login.html" data-kk="Кіру" data-ru="Войти">Кіру</a>
            </p>
        </div>

        <!-- Language Toggle -->
        <div class="auth-lang">
            <button class="lang-btn active" data-lang="kk">ҚАЗ</button>
            <button class="lang-btn" data-lang="ru">РУС</button>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>

</html>
